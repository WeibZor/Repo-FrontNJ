<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clima</title>
  <link rel="stylesheet" href="punto3.css">
</head>
<body>

  <div class="container">
    <h1>Consulta el Clima</h1>

    <input 
      type="text" 
      id="ciudad" 
      placeholder="Ej: Medellín"
      onkeypress="if(event.key === 'Enter') buscarClima()"
    >

    <button onclick="buscarClima()">Buscar</button>

    <div id="resultado"></div>
  </div>

  <script src="punto2.js"></script>
</body>
</html>
