<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>App del Clima</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e0f2fe;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .weather-app {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 8px;
      cursor: pointer;
    }

    .result {
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="weather-app">
    <h2>🌤️ Clima</h2>
    <input type="text" id="cityInput" placeholder="Ingresa una ciudad">
    <button id="searchBtn">Buscar</button>
    <div class="result" id="result"></div>
  </div>

  <script src="punto2.js"></script>
</body>
</html>
